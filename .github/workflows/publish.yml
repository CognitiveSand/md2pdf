name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 bundles npm >= 11.5.1, required for trusted publishing.
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify release tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${{ github.event.release.tag_name }}" ]; then
            echo "Release tag ${{ github.event.release.tag_name }} does not match package.json $PKG_VERSION"
            exit 1
          fi

      - run: npm ci

      # prepack runs the full test:all release gate (typecheck, unit,
      # contracts, artifact checks, build, browser, real-browser) before
      # anything is uploaded. The runner's preinstalled browsers back the
      # browser suites.
      - run: npm publish --access public

<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">md2pdf file relationship diagram</title>
  <desc id="desc">Architecture diagram showing how md2pdf source files depend on each other from CLI entrypoint to PDF rendering and artifact provisioning.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#384250"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #111827; font: 700 28px Arial, sans-serif; }
      .subtitle { fill: #4b5563; font: 400 15px Arial, sans-serif; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .group-title { fill: #1f2937; font: 700 15px Arial, sans-serif; }
      .node { stroke-width: 1.5; }
      .entry { fill: #dbeafe; stroke: #2563eb; }
      .orchestration { fill: #dcfce7; stroke: #16a34a; }
      .render { fill: #fef3c7; stroke: #d97706; }
      .browser { fill: #ede9fe; stroke: #7c3aed; }
      .artifact { fill: #fee2e2; stroke: #dc2626; }
      .support { fill: #e0f2fe; stroke: #0284c7; }
      .asset { fill: #f1f5f9; stroke: #64748b; }
      .node-title { fill: #111827; font: 700 14px Arial, sans-serif; }
      .node-text { fill: #374151; font: 400 12px Arial, sans-serif; }
      .edge { fill: none; stroke: #384250; stroke-width: 1.8; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #64748b; stroke-width: 1.4; stroke-dasharray: 5 5; marker-end: url(#arrow); }
      .legend { fill: #475569; font: 400 12px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="760"/>
  <text class="title" x="40" y="48">md2pdf - liens entre fichiers source</text>
  <text class="subtitle" x="40" y="74">Flux principal de conversion, modules support, et chemin de provisioning des artefacts runtime.</text>

  <rect class="group" x="30" y="105" width="1120" height="280" rx="8"/>
  <text class="group-title" x="50" y="132">Flux principal Markdown vers PDF</text>

  <rect class="node entry" x="60" y="165" width="145" height="76" rx="6"/>
  <text class="node-title" x="82" y="194">cli.ts</text>
  <text class="node-text" x="82" y="216">parse args</text>

  <rect class="node orchestration" x="250" y="165" width="160" height="76" rx="6"/>
  <text class="node-title" x="282" y="194">pipeline.ts</text>
  <text class="node-text" x="282" y="216">batch outcomes</text>

  <rect class="node orchestration" x="455" y="130" width="150" height="70" rx="6"/>
  <text class="node-title" x="496" y="158">paths.ts</text>
  <text class="node-text" x="483" y="180">jobs + outputs</text>

  <rect class="node orchestration" x="455" y="230" width="150" height="70" rx="6"/>
  <text class="node-title" x="484" y="258">overwrite.ts</text>
  <text class="node-text" x="483" y="280">skip / prompt</text>

  <rect class="node render" x="650" y="165" width="165" height="76" rx="6"/>
  <text class="node-title" x="689" y="194">converter.ts</text>
  <text class="node-text" x="685" y="216">one document</text>

  <rect class="node render" x="860" y="125" width="190" height="76" rx="6"/>
  <text class="node-title" x="889" y="154">markdownRenderer.ts</text>
  <text class="node-text" x="899" y="176">Markdown to HTML</text>

  <rect class="node browser" x="860" y="260" width="190" height="76" rx="6"/>
  <text class="node-title" x="902" y="289">webDriverClient.ts</text>
  <text class="node-text" x="910" y="311">load + print PDF</text>

  <path class="edge" d="M 205 203 L 250 203"/>
  <path class="edge" d="M 410 203 C 430 203 430 165 455 165"/>
  <path class="edge" d="M 410 203 C 430 203 430 265 455 265"/>
  <path class="edge" d="M 605 165 C 625 165 625 203 650 203"/>
  <path class="edge" d="M 605 265 C 625 265 625 203 650 203"/>
  <path class="edge" d="M 815 193 C 835 193 835 163 860 163"/>
  <path class="edge" d="M 815 213 C 835 213 835 298 860 298"/>

  <rect class="group" x="30" y="415" width="540" height="285" rx="8"/>
  <text class="group-title" x="50" y="442">Runtime navigateur</text>

  <rect class="node browser" x="60" y="480" width="180" height="76" rx="6"/>
  <text class="node-title" x="100" y="509">browserLocator.ts</text>
  <text class="node-text" x="86" y="531">browser + driver</text>

  <rect class="node browser" x="310" y="480" width="185" height="76" rx="6"/>
  <text class="node-title" x="350" y="509">webDriverSession.ts</text>
  <text class="node-text" x="351" y="531">spawn local driver</text>

  <rect class="node support" x="185" y="605" width="195" height="58" rx="6"/>
  <text class="node-title" x="239" y="630">contracts.ts</text>
  <text class="node-text" x="230" y="649">shared types</text>

  <path class="edge" d="M 733 241 C 733 345 150 345 150 480"/>
  <path class="edge" d="M 733 241 C 733 375 402 375 402 480"/>
  <path class="edge" d="M 240 518 L 310 518"/>
  <path class="edge" d="M 402 480 C 455 420 820 405 913 336"/>
  <path class="edge-soft" d="M 185 634 C 130 610 110 560 105 556"/>
  <path class="edge-soft" d="M 380 634 C 470 610 555 535 650 220"/>

  <rect class="group" x="610" y="415" width="540" height="285" rx="8"/>
  <text class="group-title" x="630" y="442">Artefacts, erreurs et ressources</text>

  <rect class="node artifact" x="640" y="475" width="170" height="70" rx="6"/>
  <text class="node-title" x="682" y="503">artifactPolicy.ts</text>
  <text class="node-text" x="676" y="525">newest eligible</text>

  <rect class="node artifact" x="850" y="475" width="170" height="70" rx="6"/>
  <text class="node-title" x="893" y="503">releaseCatalog.ts</text>
  <text class="node-text" x="886" y="525">artifacts.json</text>

  <rect class="node artifact" x="740" y="590" width="230" height="70" rx="6"/>
  <text class="node-title" x="787" y="618">fallbackBrowserProvisioner.ts</text>
  <text class="node-text" x="800" y="640">fallback cache</text>

  <rect class="node support" x="1030" y="475" width="90" height="70" rx="6"/>
  <text class="node-title" x="1050" y="503">errors.ts</text>
  <text class="node-text" x="1047" y="525">typed</text>

  <rect class="node asset" x="1030" y="590" width="90" height="70" rx="6"/>
  <text class="node-title" x="1050" y="618">assets/</text>
  <text class="node-text" x="1044" y="640">CSS</text>

  <path class="edge" d="M 810 510 L 850 510"/>
  <path class="edge" d="M 725 545 C 725 575 790 575 815 590"/>
  <path class="edge" d="M 935 545 C 935 575 895 575 880 590"/>
  <path class="edge" d="M 150 480 C 260 430 520 430 640 510"/>
  <path class="edge" d="M 150 480 C 250 395 690 385 820 590"/>
  <path class="edge-soft" d="M 955 163 C 1075 205 1100 385 1075 475"/>
  <path class="edge-soft" d="M 955 163 C 1075 220 1090 500 1075 590"/>
  <path class="edge-soft" d="M 955 298 C 1100 330 1110 420 1075 475"/>

  <text class="legend" x="40" y="730">Trait plein: appel direct ou dependance de flux. Trait pointille: dependance transversale de types, erreurs ou ressources.</text>
</svg>
